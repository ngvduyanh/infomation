<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkpage Cá Nhân</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 450px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #ddd; margin-bottom: 15px; }
        h1 { margin: 10px 0; font-size: 24px; }
        .info-box { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: left; font-size: 14px; }
        .btn { display: block; background: #333; color: white; padding: 12px; margin: 10px 0; text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #555; }
        .spotify-embed { margin-top: 20px; }
        .support-section { margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <img src="avatar.jpg" alt="Avatar" class="avatar">
    <h1>Tên Của Bạn</h1>
    <div class="info-box">
        <p>🎓 <strong>Học vấn:</strong> ...</p>
        <p>💼 <strong>Công việc:</strong> ...</p>
        <p>🎮 <strong>In-game Name:</strong> ...</p>
        <p>📧 <strong>Liên hệ:</strong> email@example.com</p>
    </div>

    <a href="https://facebook.com" class="btn">Facebook</a>
    <a href="https://instagram.com" class="btn">Instagram</a>
    <a href="https://tiktok.com" class="btn">TikTok</a>
    <a href="https://chotot.com" class="btn">Shop trên Chợ Tốt</a>

    <div class="spotify-embed">
        <p><strong>Playlist mình đang nghe:</strong></p>
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/..." width="100%" height="232" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
    </div>

    <div class="support-section">
        <p>💰 <strong>Ủng hộ (Donate):</strong> Bank: 123456789 (Vietcombank)</p>
        <p>🤝 <strong>Tư vấn/Hỗ trợ:</strong> Nhắn tin trực tiếp qua các kênh trên</p>
    </div>
</div>

</body>
</html>
